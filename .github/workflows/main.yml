name: Full Reset and Unzip
on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Name of the zip file in the repo (e.g., myfiles.zip)'
        required: true
        default: 'archive.zip'

jobs:
  clean-and-extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete old files
        run: |
          # Deletes everything except .git, .github, and the ZIP file itself
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '${{ github.event.inputs.zip_name }}' ! -name '.' -exec rm -rf {} +

      - name: Extract and Clean Up
        run: |
          unzip -o "${{ github.event.inputs.zip_name }}"
          rm "${{ github.event.inputs.zip_name }}"

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Full reset: Extracted contents of ${{ github.event.inputs.zip_name }}"
