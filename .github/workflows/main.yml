name: Full Reset and Unzip
on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Name of the zip file (e.g., archive.zip)'
        required: true
        default: 'archive.zip'

jobs:
  clean-and-extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete old files
        run: |
          # Clean everything except essential git/github files and the ZIP
          find . -maxdepth 1 ! -name '.git' ! -name '.github' ! -name '${{ github.event.inputs.zip_name }}' ! -name '.' -exec rm -rf {} +

      - name: Extract and Move Contents
        run: |
          # 1. Create a temp directory to avoid conflicts
          mkdir temp_extract
          unzip -o "${{ github.event.inputs.zip_name }}" -d temp_extract
          
          # 2. Move contents of the first subfolder to the root
          # This handles cases where the ZIP contains one main folder
          shopt -s dotglob
          mv temp_extract/*/* . 2>/dev/null || mv temp_extract/* .
          
          # 3. Cleanup
          rm -rf temp_extract
          rm "${{ github.event.inputs.zip_name }}"

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Full reset: Extracted contents of ${{ github.event.inputs.zip_name }} to root"
